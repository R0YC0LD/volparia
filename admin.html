  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="assets/site.css?v=9">

  <script src="assets/common.js?v=9" defer></script>
  <script src="assets/admin.js?v=9" defer></script>

<body class="admin-body">

  <section class="login-screen show" id="adminLogin" aria-label="Yönetici girişi">
    <a class="round-close" id="closeLogin" href="index.html" aria-label="Mağazaya dön">×</a>
    <form id="loginForm" class="login-card">
      <div class="login-brand"><i class="brand-mark" data-fox></i>VOLPARIA</div>
      <span class="eyebrow">YÖNETİM PANELİ</span>
      <h1>Yönetici girişi</h1>
      <p>Mağaza yönetimine devam etmek için bilgilerinizi girin.</p>
      <label>Kullanıcı adı<input id="adminUsername" autocomplete="username" required></label>
      <label>Şifre<div class="password-field"><input id="adminPassword" type="password" autocomplete="current-password" required><button type="button" id="showPassword">Göster</button></div></label>
      <button class="button dark full" type="submit">Giriş yap →</button>
      <small id="loginMessage">Güvenli yönetim oturumu</small>
    </form>
  </section>

  <section class="admin-app" id="adminApp">
    <aside class="admin-sidebar">
      <div class="admin-logo"><i class="brand-mark" data-fox></i>VOLPARIA<small>YÖNETİM PANELİ</small></div>
      <nav id="adminNav"></nav>
      <div class="storage-state"><i id="storageDot"></i><span><b id="storageLabel">Veri katmanı</b><small id="storageDetail">Bağlantı kontrol ediliyor</small></span></div>
      <button class="admin-exit" id="adminLogout">Çıkış yap</button>
    </aside>
    <main class="admin-main">
      <header class="admin-top">
        <div><span class="eyebrow">VOLPARIA YÖNETİM</span><h1 id="adminTitle">Genel Bakış</h1></div>
        <div><a class="button outline" href="index.html" target="_blank" rel="noopener">Mağazayı görüntüle ↗</a></div>
      </header>
      <div id="adminContent"></div>
    </main>
  </section>

  <div class="toast" id="toast" role="status"></div>
  <noscript>Yönetim panelini kullanmak için JavaScript'i etkinleştirin.</noscript>
</body>
</html>
